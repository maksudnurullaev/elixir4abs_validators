name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        elixir: [ "1.17" ]
        otp: [ "27" ]

    env:
      MIX_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore deps cache
        uses: actions/cache@v4
        id: deps-cache
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{
            hashFiles('mix.lock') }}
          restore-keys: deps-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{
            hashFiles('mix.lock') }}
          restore-keys: build-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      # - name: Check formatting
      #   run: mix format --check-formatted

      - name: Run tests
        run: mix test

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      MIX_ENV: prod

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Restore deps cache
        uses: actions/cache@v4
        id: deps-cache
        with:
          path: deps
          key: deps-${{ runner.os }}-27-1.17-${{ hashFiles('mix.lock') }}
          restore-keys: deps-${{ runner.os }}-27-1.17-

      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: mix deps.get --only prod

      - name: Build assets
        run: mix assets.deploy

      - name: Build release
        run: mix release
        env:
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          PHX_HOST: elixir4dev.uz 
      - name: Upload release to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_USER_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "_build/prod/rel/elixir4abs_validators"
          target: "/opt/elixir4dev/releases/${{ github.sha }}"
          strip_components: 3

      - name: Restart application
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_USER_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            # Устанавливаем переменные окружения
            source ~/.profile
            # Останавливаем текущий сервис (если запущен)
            if /opt/elixir4dev/current/bin/elixir4abs_validators pid > /dev/null 2>&1; then
              /opt/elixir4dev/current/bin/elixir4abs_validators stop
              for i in $(seq 1 30); do
                /opt/elixir4dev/current/bin/elixir4abs_validators pid > /dev/null 2>&1 || break
                echo "Waiting for process to stop... ($i/30)"
                sleep 1
              done
            fi

            # Создаем символическую ссылку на новую версию
            ln -sfn /opt/elixir4dev/releases/${{ github.sha }}/elixir4abs_validators /opt/elixir4dev/current

            # Запускаем сервис
            /opt/elixir4dev/current/bin/elixir4abs_validators daemon
            sleep 5
            curl -sf http://localhost:${PORT}/health || (echo "Health check failed" && exit 1)
